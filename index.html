<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLN <> EUR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="poland.png">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #0052b4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 0.9rem; opacity: 0.7; text-transform: uppercase; }
        input { border: 2px solid #e0e0e0; border-radius: 12px; padding: 16px; font-size: 2rem; width: 100%; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--accent); }
        .status { font-size: 0.8rem; text-align: center; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="input-group">
        <label>Euro (EUR)</label>
        <input type="text" id="eur" inputmode="decimal" placeholder="0.00">
    </div>
    <div class="input-group">
        <label>Polish Zloty (PLN)</label>
        <input type="text" id="pln" inputmode="decimal" placeholder="0.00">
    </div>
    <div id="status" class="status">Checking rate...</div>
</div>

<script>
    const eurInput = document.getElementById('eur');
    const plnInput = document.getElementById('pln');
    const statusDiv = document.getElementById('status');
    let rate = localStorage.getItem('eur_to_pln') || 4.30; // Fallback rate

    // Initialize UI
    statusDiv.innerText = `Rate: 1 EUR = ${rate} PLN (Stored)`;

    // Fetch latest rate from Frankfurter API
    async function updateRate() {
        try {
            const res = await fetch('https://api.frankfurter.app/latest?from=EUR&to=PLN');
            const data = await res.json();
            rate = data.rates.PLN;
            localStorage.setItem('eur_to_pln', rate);
            statusDiv.innerText = `Rate: 1 EUR = ${rate} PLN (Live)`;
        } catch (e) {
            statusDiv.innerText = `Offline: Using rate 1 EUR = ${rate} PLN`;
        }
    }

    updateRate();

    // Logic for instant conversion
    eurInput.addEventListener('input', () => {
        const val = parseFloat(eurInput.value.replace(',', '.'));
        if (!isNaN(val)) {
            plnInput.value = (val * rate).toFixed(2);
        } else {
            plnInput.value = '';
        }
    });

    plnInput.addEventListener('input', () => {
        const val = parseFloat(plnInput.value.replace(',', '.'));
        if (!isNaN(val)) {
            eurInput.value = (val / rate).toFixed(2);
        } else {
            eurInput.value = '';
        }
    });

    // Register Service Worker for PWA/Offline
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
